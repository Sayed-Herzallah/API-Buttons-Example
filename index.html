<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="#">MySite</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link active" href="#">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Posts</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">About</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container my-5">
    <h2 class="mb-4">API Buttons Example</h2>


    <!-- Buttons -->
    <div class="d-flex gap-2 flex-wrap mb-4" id="parent">
      <button type="button" class="btn btn-outline-primary" class="btn">Post 1</button>
      <button type="button" class="btn btn-outline-secondary" class="btn">Post 2</button>
      <button type="button" class="btn btn-outline-success" class="btn">Post 3</button>
            <button type="button" class="btn btn-outline-primary" class="btn">Post 4</button>
      <button type="button" class="btn btn-outline-secondary" class="btn">Post 5</button>
      <button type="button" class="btn btn-outline-success" class="btn">Post 6</button>
            <button type="button" class="btn btn-outline-primary" class="btn">Post 7</button>
      <button type="button" class="btn btn-outline-secondary" class="btn">Post 8</button>
      <button type="button" class="btn btn-outline-success" id="btn">Post 9</button>
            <button type="button" class="btn btn-outline-primary" class="btn">Post 10</button>
      <button type="button" class="btn btn-outline-secondary" class="btn">Post 11</button>
      <button type="button" class="btn btn-outline-success" class="btn">Post 12</button>

    </div>

    <!-- Output -->
    <div  class="p-2 border rounded bg-light"   id="output">
      Press a button to see data here.
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-primary text-white text-center py-3">
    &copy; 2025 MySite. All Rights Reserved.
  </footer>

  <!-- Optional JS -->
  <script src="main.js"></script>
</body>
</html>
